<style>
:root {
  --bg: #ffffff;
  --surface: #f4f5f7;
  --text: #0a0a0a;
  --text-secondary: #444444;
  --text-muted: #888888;
  --primary: #0d2d6b;
  --primary-hover: #1a4494;
  --border: #d0d4de;
  --green: #1a7a4a;
  --red: #c0392b;
  --yellow: #b07d00;
  --sidebar-w: 220px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }

/* Sidebar */
.sidebar { width:var(--sidebar-w); min-width:var(--sidebar-w); background:var(--bg); border-right:1px solid var(--border); display:flex; flex-direction:column; height:100vh; overflow-y:auto; }
.sidebar-brand { padding:24px 20px 20px; border-bottom:1px solid var(--border); }
.sidebar-brand h1 { font-size:20px; font-weight:700; color:var(--primary); letter-spacing:1px; }
.sidebar-brand p { font-size:11px; color:var(--text-muted); margin-top:2px; font-family:'IBM Plex Mono',monospace; }
.sidebar nav { flex:1; padding:12px 0; }
.nav-item { display:flex; align-items:center; gap:10px; padding:10px 20px; cursor:pointer; font-size:14px; font-weight:500; color:var(--text-secondary); border-left:3px solid transparent; transition:all .15s; position:relative; }
.nav-item:hover { background:var(--surface); color:var(--primary); }
.nav-item.active { background:var(--primary); color:#fff; border-left-color:var(--primary); }
.nav-item .nav-icon { width:18px; text-align:center; font-size:15px; }
.nav-badge { position:absolute; right:12px; background:var(--red); color:#fff; font-size:11px; font-family:'IBM Plex Mono',monospace; font-weight:600; padding:1px 6px; border-radius:10px; min-width:20px; text-align:center; }
.nav-item.active .nav-badge { background:#fff; color:var(--red); }
.sidebar-footer { padding:16px 20px; border-top:1px solid var(--border); font-size:11px; color:var(--text-muted); }

/* Main */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { background:var(--bg); border-bottom:1px solid var(--border); padding:16px 28px; display:flex; align-items:center; justify-content:space-between; min-height:60px; }
.topbar h2 { font-size:18px; font-weight:600; color:var(--text); }
.topbar-actions { display:flex; gap:8px; align-items:center; }
.content { flex:1; overflow-y:auto; padding:24px 28px; background:var(--surface); }
.section { display:none; }
.section.active { display:block; }

/* Buttons */
.btn { padding:8px 18px; border:none; border-radius:6px; font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; display:inline-flex; align-items:center; gap:6px; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-hover); }
.btn-ghost { background:transparent; color:var(--text-secondary); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--primary); color:var(--primary); }
.btn-danger { background:var(--red); color:#fff; }
.btn-danger:hover { background:#a93226; }
.btn-sm { padding:5px 12px; font-size:12px; }
.btn-success { background:var(--green); color:#fff; }
.btn-success:hover { background:#15643c; }

/* Stat Cards */
.stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:20px; }
.stat-card { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:18px 20px; }
.stat-card .stat-label { font-size:12px; font-weight:500; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; font-family:'IBM Plex Mono',monospace; margin-bottom:6px; }
.stat-card .stat-value { font-size:28px; font-weight:700; color:var(--text); font-family:'IBM Plex Mono',monospace; }
.stat-card .stat-sub { font-size:12px; color:var(--text-muted); margin-top:4px; }
.stat-card.alert .stat-value { color:var(--red); }
.stat-card.warn .stat-value { color:var(--yellow); }
.stat-card.good .stat-value { color:var(--green); }

/* Tables */
.data-table { width:100%; border-collapse:collapse; background:var(--bg); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.data-table th { background:var(--surface); padding:10px 14px; text-align:left; font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; font-family:'IBM Plex Mono',monospace; border-bottom:1px solid var(--border); }
.data-table td { padding:10px 14px; font-size:13px; border-bottom:1px solid var(--border); vertical-align:middle; }
.data-table tr:last-child td { border-bottom:none; }
.data-table tr:hover td { background:var(--surface); }

/* Cards Grid */
.card-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.card-grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
.card { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:20px; }
.card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.card-title { font-size:16px; font-weight:600; color:var(--text); }
.card-subtitle { font-size:12px; color:var(--text-muted); font-family:'IBM Plex Mono',monospace; }
.card-body p { font-size:13px; color:var(--text-secondary); margin-bottom:6px; }
.card-body a { color:var(--primary); text-decoration:none; }
.card-body a:hover { text-decoration:underline; }
.card-actions { display:flex; gap:6px; margin-top:14px; padding-top:12px; border-top:1px solid var(--border); }

/* Badges */
.badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:11px; font-weight:600; font-family:'IBM Plex Mono',monospace; }
.badge-green { background:#e6f4ec; color:var(--green); }
.badge-red { background:#fce8e6; color:var(--red); }
.badge-yellow { background:#fef3d6; color:var(--yellow); }
.badge-blue { background:#e3ecf9; color:var(--primary); }
.badge-gray { background:#eee; color:#666; }

/* Month Grid */
.month-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
.month-cell { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:12px; cursor:pointer; text-align:center; transition:all .15s; }
.month-cell:hover { border-color:var(--primary); }
.month-cell.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.month-cell .month-name { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
.month-cell .month-count { font-size:18px; font-weight:700; font-family:'IBM Plex Mono',monospace; margin-top:4px; }
.month-cell .month-dollars { font-size:11px; font-family:'IBM Plex Mono',monospace; opacity:.7; }
.month-cell.active .month-name,.month-cell.active .month-count,.month-cell.active .month-dollars { color:#fff; }

/* Year Nav */
.year-nav { display:flex; align-items:center; gap:16px; margin-bottom:16px; }
.year-nav .year-display { font-size:22px; font-weight:700; color:var(--primary); font-family:'IBM Plex Mono',monospace; min-width:60px; text-align:center; }
.year-nav button { background:var(--surface); border:1px solid var(--border); width:32px; height:32px; border-radius:6px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }
.year-nav button:hover { background:var(--primary); color:#fff; border-color:var(--primary); }

/* Alert Banner */
.alert-banner { background:#fce8e6; border:1px solid var(--red); border-radius:8px; padding:16px 20px; margin-bottom:20px; }
.alert-banner h4 { color:var(--red); font-size:14px; margin-bottom:8px; }
.alert-banner .alert-item { font-size:13px; color:var(--text-secondary); margin-bottom:4px; }
.alert-banner .alert-item a { color:var(--primary); }

/* Search/Filter Bar */
.filter-bar { display:flex; gap:12px; margin-bottom:16px; align-items:center; }
.filter-bar input, .filter-bar select { padding:8px 14px; border:1px solid var(--border); border-radius:6px; font-family:'IBM Plex Sans',sans-serif; font-size:13px; background:var(--bg); }
.filter-bar input { flex:1; max-width:300px; }
.filter-bar input:focus, .filter-bar select:focus { outline:none; border-color:var(--primary); }

/* Qty Bar */
.qty-bar { display:flex; align-items:center; gap:8px; }
.qty-bar-track { width:60px; height:6px; background:#eee; border-radius:3px; overflow:hidden; }
.qty-bar-fill { height:100%; border-radius:3px; }

/* Progress Bar */
.progress-container { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:16px 20px; margin-bottom:20px; }
.progress-label { display:flex; justify-content:space-between; margin-bottom:8px; font-size:13px; }
.progress-track { height:20px; background:#eee; border-radius:10px; overflow:hidden; }
.progress-fill { height:100%; border-radius:10px; transition:width .3s; }

/* Bar Chart */
.bar-chart { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:20px; margin-bottom:20px; }
.bar-chart h4 { font-size:14px; margin-bottom:16px; color:var(--text-secondary); }
.bars { display:flex; align-items:flex-end; gap:8px; height:180px; }
.bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end; }
.bar { width:100%; background:var(--primary); border-radius:4px 4px 0 0; min-height:2px; transition:height .3s; }
.bar-label { font-size:10px; color:var(--text-muted); font-family:'IBM Plex Mono',monospace; }
.bar-value { font-size:10px; color:var(--text-secondary); font-family:'IBM Plex Mono',monospace; }

/* Maintenance / Fuel List */
.history-list { margin-top:12px; }
.history-item { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--border); font-size:12px; }
.history-item:last-child { border-bottom:none; }
.history-section-title { font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; margin-top:12px; margin-bottom:6px; font-family:'IBM Plex Mono',monospace; }

/* Activity Log */
.activity-list { background:var(--bg); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.activity-item { padding:10px 16px; border-bottom:1px solid var(--border); font-size:13px; display:flex; gap:12px; }
.activity-item:last-child { border-bottom:none; }
.activity-time { color:var(--text-muted); font-family:'IBM Plex Mono',monospace; font-size:11px; white-space:nowrap; min-width:140px; }
.activity-text { color:var(--text-secondary); }

/* Quick Actions */
.quick-actions { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:20px; }
.quick-action { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:16px; cursor:pointer; text-align:center; transition:all .15s; }
.quick-action:hover { border-color:var(--primary); background:var(--surface); }
.quick-action .qa-icon { font-size:24px; margin-bottom:6px; }
.quick-action .qa-label { font-size:13px; font-weight:500; color:var(--text-secondary); }

/* Modal */
.modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.5); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.active { display:flex; }
.modal-box { background:var(--bg); border-radius:10px; padding:28px; width:520px; max-width:95vw; max-height:85vh; overflow-y:auto; position:relative; }
.modal-box h3 { font-size:18px; font-weight:600; margin-bottom:20px; color:var(--text); }
.modal-close { position:absolute; top:16px; right:16px; background:none; border:none; font-size:22px; cursor:pointer; color:var(--text-muted); padding:4px; }
.modal-close:hover { color:var(--text); }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; font-family:'IBM Plex Mono',monospace; margin-bottom:5px; }
.form-group input, .form-group select, .form-group textarea { width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:6px; font-family:'IBM Plex Sans',sans-serif; font-size:14px; background:var(--bg); }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline:none; border-color:var(--primary); }
.form-group textarea { min-height:60px; resize:vertical; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }

/* Toast */
.toast-container { position:fixed; bottom:20px; right:20px; z-index:2000; display:flex; flex-direction:column; gap:8px; }
.toast { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:14px 20px; box-shadow:0 4px 16px rgba(0,0,0,.12); font-size:13px; min-width:280px; max-width:400px; animation:toastIn .3s ease; border-left:4px solid var(--border); }
.toast.error { border-left-color:var(--red); }
.toast.success { border-left-color:var(--green); }
@keyframes toastIn { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }

/* Print */
@media print {
  .sidebar, .topbar, .topbar-actions, .btn, .filter-bar, .nav-badge, .card-actions, .modal-overlay, .toast-container { display:none !important; }
  body { display:block; }
  .main { overflow:visible; }
  .content { padding:0; background:#fff; overflow:visible; }
  .section.active { display:block; }
  .data-table { font-size:11px; }
  .stat-card .stat-value { font-size:20px; }
}
</style>

var state;

function loadState() {
  try {
    var saved = localStorage.getItem('xepa-inventory-state');
    if (saved) {
      state = JSON.parse(saved);
      // Ensure new fields exist
      if (!state.activityLog) state.activityLog = [];
      if (!state.reportMonth) state.reportMonth = new Date().getMonth();
      if (!state.reportYear) state.reportYear = new Date().getFullYear();
      return;
    }
  } catch(e) {}
  state = defaultState();
}

function saveState(localOnly) {
  try { localStorage.setItem('xepa-inventory-state', JSON.stringify(state)); } catch(e) {}
  if (!localOnly) scheduleDriveSync();
}

function nextId(arr) {
  return arr.length ? Math.max.apply(null, arr.map(function(x){return x.id})) + 1 : 1;
}

// ========== UTILITIES ==========
function fmt(n) { return '$' + Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function daysBetween(dateStr) {
  var d = new Date(dateStr);
  var now = new Date();
  now.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return Math.ceil((d - now) / 86400000);
}

function statusBadge(days) {
  if (days < 0) return '<span class="badge badge-red">Overdue</span>';
  if (days <= 30) return '<span class="badge badge-yellow">Due Soon</span>';
  return '<span class="badge badge-green">OK</span>';
}

function getSupplier(id) {
  for (var i=0;i<state.suppliers.length;i++) if (state.suppliers[i].id===id) return state.suppliers[i];
  return null;
}

function lowStockItems() {
  return state.inventory.filter(function(it){ return it.qty <= it.threshold; });
}

function logActivity(action, section, detail) {
  state.activityLog.unshift({ timestamp: new Date().toISOString(), action:action, section:section, detail:detail });
  if (state.activityLog.length > 100) state.activityLog.length = 100;
  saveState();
}

// ========== TOAST ==========
function showToast(msg, type) {
  var c = document.getElementById('toastContainer');
  var t = document.createElement('div');
  t.className = 'toast ' + (type||'');
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 4000);
}

// ========== CSV EXPORT ==========
function exportCSV(filename, headers, rows) {
  var csv = headers.join(',') + '\n';
  rows.forEach(function(r){
    csv += r.map(function(c){ return '"' + String(c).replace(/"/g,'""') + '"'; }).join(',') + '\n';
  });
  var blob = new Blob([csv], {type:'text/csv'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ========== EMAIL PDF ==========
function emailPDF(subject) {
  window.print();
  setTimeout(function(){
    var mailto = 'mailto:?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent('Please find the attached PDF report.\n\nGenerated by XEPA Inventory');
    window.open(mailto, '_blank');
  }, 500);
}

// ========== NAV / TABS ==========

function renderSection(tab) {

  h += '<div class="quick-action" onclick="switchTab(\'suppliers\')"><div class="qa-icon">&#128101;</div><div class="qa-label">Suppliers</div></div>';
  h += '<div class="quick-action" onclick="switchTab(\'budget\')"><div class="qa-icon">&#128176;</div><div class="qa-label">Budget</div></div>';

// ========== INVENTORY ==========
function renderInventory() {
  var h = '';

  // Year nav
  h += '<div class="year-nav"><button onclick="state.year--;saveState();renderInventory()">&#9664;</button><div class="year-display">'+state.year+'</div><button onclick="state.year++;saveState();renderInventory()">&#9654;</button>';
  if (state.selectedMonth !== null) h += '<button class="btn btn-ghost btn-sm" onclick="state.selectedMonth=null;saveState();renderInventory()" style="margin-left:12px">All Months</button>';
  h += '</div>';

  // Month grid
  h += '<div class="month-grid">';
  for (var m=0;m<12;m++) {
    var items = state.inventory.filter(function(it){ return it.monthAdded===(m+1) && it.yearAdded===state.year; });
    var dollars = items.reduce(function(s,it){ return s+it.qty*it.unitCost; },0);
    var active = state.selectedMonth===m ? ' active':'';
    h += '<div class="month-cell'+active+'" onclick="toggleMonth('+m+')"><div class="month-name">'+MONTHS[m]+'</div><div class="month-count">'+items.length+'</div><div class="month-dollars">'+fmt(dollars)+'</div></div>';
  }
  h += '</div>';

  // Stat cards
  var allItems = state.inventory;
  var low = lowStockItems();
  var cats = [];
  allItems.forEach(function(it){ if (cats.indexOf(it.category)<0) cats.push(it.category); });
  var monthlySpend = allItems.reduce(function(s,it){ return s+it.qty*it.unitCost; },0) / 12;

  h += '<div class="stat-grid">';
  h += '<div class="stat-card"><div class="stat-label">Total Items</div><div class="stat-value">'+allItems.length+'</div></div>';
  h += '<div class="stat-card'+(low.length>0?' alert':'')+'"><div class="stat-label">Low Stock Alerts</div><div class="stat-value">'+low.length+'</div></div>';
  h += '<div class="stat-card"><div class="stat-label">Categories</div><div class="stat-value">'+cats.length+'</div></div>';
  h += '<div class="stat-card"><div class="stat-label">Est. Monthly Spend</div><div class="stat-value">'+fmt(monthlySpend)+'</div></div>';
  h += '</div>';

  // Alert banner
  if (low.length > 0) {
    h += '<div class="alert-banner"><h4>&#9888; Low Stock Alert — '+low.length+' item'+(low.length>1?'s':'')+' below threshold</h4>';
    low.forEach(function(it){
      var sup = getSupplier(it.supplierId);
      h += '<div class="alert-item"><strong>'+it.name+'</strong> — Qty: '+it.qty+' (Threshold: '+it.threshold+', Reorder: '+it.reorderQty+')';
      if (sup) h += ' — <a href="'+sup.orderUrl+'" target="_blank">Order from '+sup.name+'</a>';
      h += '</div>';
    });
    h += '</div>';
  }

  // Filter bar
  h += '<div class="filter-bar"><input type="text" placeholder="Search items..." value="'+escH(state.searchTerm)+'" oninput="state.searchTerm=this.value;renderInventory()">';
  h += '<select onchange="state.categoryFilter=this.value;renderInventory()"><option value="">All Categories</option>';
  cats.forEach(function(c){ h += '<option value="'+escH(c)+'"'+(state.categoryFilter===c?' selected':'')+'>'+escH(c)+'</option>'; });
  h += '</select></div>';

  // Filter items
  var filtered = state.inventory.filter(function(it){
    if (state.selectedMonth!==null && (it.monthAdded!==(state.selectedMonth+1) || it.yearAdded!==state.year)) return false;
    if (state.categoryFilter && it.category!==state.categoryFilter) return false;
    if (state.searchTerm && it.name.toLowerCase().indexOf(state.searchTerm.toLowerCase())<0) return false;
    return true;
  });

  // Table
  h += '<table class="data-table"><thead><tr><th>Item Name</th><th>Category</th><th>Location</th><th>Qty</th><th>Threshold</th><th>Unit Cost</th><th>Reorder</th><th>Status</th><th>Supplier</th><th>Actions</th></tr></thead><tbody>';
  filtered.forEach(function(it){
    var sup = getSupplier(it.supplierId);
    var pct = it.threshold > 0 ? Math.min(100, Math.round(it.qty/it.threshold*100)) : 100;
    var barColor = it.qty<=it.threshold ? 'var(--red)' : (pct<200?'var(--yellow)':'var(--green)');
    var statusClass = it.qty<=it.threshold ? 'badge-red' : 'badge-green';
    var statusMap = {'In Use':'badge-green','In Storage':'badge-blue','On Order':'badge-yellow','Retired':'badge-gray'};
    var stBadge = statusMap[it.status] || 'badge-green';

    h += '<tr>';
    h += '<td><strong>'+escH(it.name)+'</strong></td>';
    h += '<td>'+escH(it.category)+'</td>';
    h += '<td style="font-size:12px;color:var(--text-muted)">'+escH(it.location||'')+'</td>';
    h += '<td><div class="qty-bar"><span style="font-family:IBM Plex Mono,monospace;font-weight:600">'+it.qty+'</span><div class="qty-bar-track"><div class="qty-bar-fill" style="width:'+Math.min(100,pct)+'%;background:'+barColor+'"></div></div></div></td>';
    h += '<td style="font-family:IBM Plex Mono,monospace">'+it.threshold+'</td>';
    h += '<td style="font-family:IBM Plex Mono,monospace">'+fmt(it.unitCost)+'</td>';
    h += '<td style="font-family:IBM Plex Mono,monospace">'+it.reorderQty+'</td>';
    h += '<td><span class="badge '+stBadge+'">'+escH(it.status)+'</span></td>';
    h += '<td>';
    if (sup) {
      h += '<a href="'+sup.orderUrl+'" target="_blank">'+escH(sup.name)+'</a><br><a href="tel:'+sup.phone+'" style="font-size:11px;color:var(--text-muted)">'+escH(sup.phone)+'</a>';
    } else h += '—';
    h += '</td>';
    h += '<td><button class="btn btn-ghost btn-sm" onclick="openModal(\'inventory\','+it.id+')">Edit</button> <button class="btn btn-ghost btn-sm" onclick="deleteItem(\'inventory\','+it.id+')">Del</button></td>';
    h += '</tr>';
  });
  h += '</tbody></table>';

  document.getElementById('sec-inventory').innerHTML = h;
}

// ========== BUDGET ==========
function renderBudget() {
  var totalSpent = state.expenses.reduce(function(s,e){ return s + e.qty*e.unitCost; },0);
  var remaining = state.budget.annual - totalSpent;
  var pct = state.budget.annual > 0 ? Math.round(totalSpent/state.budget.annual*100) : 0;
  var monthlyAvg = totalSpent / Math.max(1, new Date().getMonth()+1);
  var barColor = pct > 90 ? 'var(--red)' : (pct > 70 ? 'var(--yellow)' : 'var(--green)');

  var h = '<div class="stat-grid">';
  h += '<div class="stat-card"><div class="stat-label">Annual Budget</div><div class="stat-value">'+fmt(state.budget.annual)+'</div></div>';
  h += '<div class="stat-card"><div class="stat-label">Spent YTD</div><div class="stat-value">'+fmt(totalSpent)+'</div></div>';
  h += '<div class="stat-card'+(remaining<0?' alert':'')+'"><div class="stat-label">Remaining</div><div class="stat-value">'+fmt(remaining)+'</div></div>';
  h += '<div class="stat-card"><div class="stat-label">Monthly Average</div><div class="stat-value">'+fmt(monthlyAvg)+'</div></div>';
  h += '</div>';

  // Progress bar
  h += '<div class="progress-container"><div class="progress-label"><span>Budget Consumed</span><span style="font-family:IBM Plex Mono,monospace;font-weight:600">'+pct+'%</span></div>';
  h += '<div class="progress-track"><div class="progress-fill" style="width:'+Math.min(100,pct)+'%;background:'+barColor+'"></div></div></div>';

  // Monthly bar chart
  var monthTotals = [];
  for (var m=0;m<12;m++) monthTotals.push(0);
  state.expenses.forEach(function(e){
    var d = new Date(e.date);
    if (d.getFullYear()===state.year) monthTotals[d.getMonth()] += e.qty*e.unitCost;
  });
  var maxMonth = Math.max.apply(null, monthTotals.concat([1]));

  h += '<div class="bar-chart"><h4>Monthly Spending — '+state.year+'</h4><div class="bars">';
  for (var m=0;m<12;m++) {
    var barH = maxMonth > 0 ? Math.round(monthTotals[m]/maxMonth*160) : 0;
    h += '<div class="bar-col"><div class="bar-value">'+fmt(monthTotals[m])+'</div><div class="bar" style="height:'+barH+'px"></div><div class="bar-label">'+MONTHS[m]+'</div></div>';
  }
  h += '</div></div>';

  // Spending log table
  h += '<table class="data-table"><thead><tr><th>Date</th><th>Item / Category</th><th>Supplier</th><th>Qty</th><th>Unit Cost</th><th>Total</th><th>Notes</th></tr></thead><tbody>';
  var sortedExpenses = state.expenses.slice().sort(function(a,b){ return b.date.localeCompare(a.date); });
  sortedExpenses.forEach(function(e){
    var sup = getSupplier(e.supplierId);
    h += '<tr><td style="font-family:IBM Plex Mono,monospace">'+e.date+'</td><td>'+escH(e.itemCategory)+'</td><td>'+(sup?escH(sup.name):'—')+'</td><td style="font-family:IBM Plex Mono,monospace">'+e.qty+'</td><td style="font-family:IBM Plex Mono,monospace">'+fmt(e.unitCost)+'</td><td style="font-family:IBM Plex Mono,monospace;font-weight:600">'+fmt(e.qty*e.unitCost)+'</td><td style="color:var(--text-muted)">'+escH(e.notes||'')+'</td></tr>';
  });
  if (state.expenses.length===0) h += '<tr><td colspan="7" style="text-align:center;color:var(--text-muted)">No expenses logged yet.</td></tr>';
  h += '</tbody></table>';

  document.getElementById('sec-budget').innerHTML = h;
}

function addMaintenance(vid) {
  var v = state.vehicles.find(function(x){return x.id===vid;});
  if (!v) return;
  var dtype = prompt('Maintenance type (e.g. Oil Change):');
  if (!dtype) return;
  var dcost = prompt('Cost ($):');
  if (dcost===null) return;
  var dnotes = prompt('Notes (optional):') || '';
  var today = new Date().toISOString().slice(0,10);
  if (!v.maintenance) v.maintenance = [];
  v.maintenance.unshift({date:today, type:dtype, cost:parseFloat(dcost)||0, notes:dnotes});
  logActivity('added','Vehicles','Added maintenance for '+v.name+': '+dtype);
  saveState();
  renderVehicles();
  showToast('Maintenance record added','success');
}

function addFuel(vid) {
  var v = state.vehicles.find(function(x){return x.id===vid;});
  if (!v) return;
  var amt = prompt('Fuel amount (liters):');
  if (!amt) return;
  var cost = prompt('Total cost ($):');
  if (cost===null) return;
  var odo = prompt('Current odometer (km):');
  if (odo===null) return;
  var today = new Date().toISOString().slice(0,10);
  if (!v.fuelLog) v.fuelLog = [];
  v.fuelLog.unshift({date:today, amount:parseFloat(amt)||0, cost:parseFloat(cost)||0, odometer:parseFloat(odo)||v.odometer});
  v.odometer = parseFloat(odo)||v.odometer;
  logActivity('added','Vehicles','Added fuel entry for '+v.name);
  saveState();
  renderVehicles();
  showToast('Fuel entry added','success');
}

// ========== LAB EQUIPMENT ==========
function renderEquipment() {
  var now = new Date();
  var total = state.equipment.length;
  var overdue = state.equipment.filter(function(e){ return daysBetween(e.nextCalibration)<0; }).length;
  var dueSoon = state.equipment.filter(function(e){ var d=daysBetween(e.nextCalibration); return d>=0 && d<=30; }).length;
  var upToDate = total - overdue - dueSoon;

  var h = '<div class="stat-grid">';
  h += '<div class="stat-card"><div class="stat-label">Total Equipment</div><div class="stat-value">'+total+'</div></div>';
  h += '<div class="stat-card'+(dueSoon>0?' warn':'')+'"><div class="stat-label">Due Within 30 Days</div><div class="stat-value">'+dueSoon+'</div></div>';
  h += '<div class="stat-card'+(overdue>0?' alert':'')+'"><div class="stat-label">Overdue</div><div class="stat-value">'+overdue+'</div></div>';
  h += '<div class="stat-card good"><div class="stat-label">Up to Date</div><div class="stat-value">'+upToDate+'</div></div>';
  h += '</div>';

  // Sort by urgency
  var sorted = state.equipment.slice().sort(function(a,b){ return daysBetween(a.nextCalibration) - daysBetween(b.nextCalibration); });

  h += '<div class="card-grid-2">';
  sorted.forEach(function(eq){
    var days = daysBetween(eq.nextCalibration);
    h += '<div class="card">';
    h += '<div class="card-header"><div><div class="card-title">'+escH(eq.name)+'</div><div class="card-subtitle">S/N: '+escH(eq.serial)+'</div></div><div>'+statusBadge(days)+'</div></div>';
    h += '<div class="card-body">';
    h += '<p><strong>Type:</strong> '+escH(eq.type)+'</p>';
    h += '<p><strong>Location:</strong> '+escH(eq.location||'—')+'</p>';
    h += '<p><strong>Last Calibration:</strong> '+eq.lastCalibration+'</p>';
    h += '<p><strong>Next Due:</strong> '+eq.nextCalibration+' <span class="badge '+(days<0?'badge-red':days<=30?'badge-yellow':'badge-green')+'">'+days+' days</span></p>';
    h += '<p><strong>Interval:</strong> '+escH(eq.interval)+'</p>';
    if (eq.warrantyExpiry) h += '<p><strong>Warranty:</strong> '+eq.warrantyExpiry+'</p>';
    if (eq.notes) h += '<p style="font-size:12px;color:var(--text-muted);margin-top:6px">'+escH(eq.notes)+'</p>';
    h += '</div>';
    h += '<div class="card-actions">';
    h += '<button class="btn btn-success btn-sm" onclick="markCalibrated('+eq.id+')">&#10003; Mark Calibrated</button>';
    h += '<button class="btn btn-ghost btn-sm" onclick="openModal(\'equipment\','+eq.id+')">Edit</button>';
    h += '<button class="btn btn-ghost btn-sm" onclick="deleteItem(\'equipment\','+eq.id+')">Del</button>';
    h += '</div></div>';
  });
  h += '</div>';
  if (state.equipment.length===0) h = '<p style="color:var(--text-muted);text-align:center;padding:40px">No equipment added yet.</p>';
  document.getElementById('sec-equipment').innerHTML = h;
}

function markCalibrated(eid) {
  var eq = state.equipment.find(function(x){return x.id===eid;});
  if (!eq) return;
  var today = new Date().toISOString().slice(0,10);
  eq.lastCalibration = today;
  var d = new Date(today);
  if (eq.interval==='Monthly') d.setMonth(d.getMonth()+1);
  else if (eq.interval==='Quarterly') d.setMonth(d.getMonth()+3);
  else if (eq.interval==='Semi-Annual') d.setMonth(d.getMonth()+6);
  else d.setFullYear(d.getFullYear()+1);
  eq.nextCalibration = d.toISOString().slice(0,10);
  logActivity('calibrated','Equipment','Calibrated '+eq.name);
  saveState();
  renderEquipment();
  showToast(eq.name + ' marked as calibrated','success');
}

    var monthItems = state.inventory.filter(function(it){ return it.monthAdded===(rm+1) && it.yearAdded===ry; });

    h += '<h3 style="font-size:16px;margin-bottom:16px">Report: '+MONTHS[rm]+' '+ry+'</h3>';

    h += '<div class="stat-card"><div class="stat-label">Low Stock</div><div class="stat-value">'+lowCount+'</div></div>';
    h += '<div class="stat-card"><div class="stat-label">Total Spent</div><div class="stat-value">'+fmt(totalSpent)+'</div></div>';
    h += '<div class="stat-card"><div class="stat-label">Transactions</div><div class="stat-value">'+monthExpenses.length+'</div></div>';
    h += '</div>';

    // Inventory snapshot
    h += '<h4 style="font-size:14px;margin:20px 0 10px;color:var(--text-secondary)">Inventory Snapshot</h4>';

      h += '<tr><td>'+escH(it.name)+'</td><td>'+escH(it.category)+'</td><td style="font-family:IBM Plex Mono,monospace">'+it.qty+'</td><td><span class="badge '+(stMap[it.status]||'badge-green')+'">'+escH(it.status)+'</span></td><td style="font-family:IBM Plex Mono,monospace">'+fmt(it.unitCost)+'</td><td style="font-family:IBM Plex Mono,monospace;font-weight:600">'+fmt(it.qty*it.unitCost)+'</td></tr>';

    // Spending breakdown
    if (monthExpenses.length > 0) {
      h += '<h4 style="font-size:14px;margin:20px 0 10px;color:var(--text-secondary)">Spending Breakdown</h4>';
      h += '<table class="data-table"><thead><tr><th>Date</th><th>Item</th><th>Supplier</th><th>Qty</th><th>Unit Cost</th><th>Total</th></tr></thead><tbody>';

// ========== DELETE ==========
function deleteItem(type, id) {
  if (!confirm('Are you sure you want to delete this item?')) return;
  if (type==='inventory') {
    var it = state.inventory.find(function(x){return x.id===id;});
    state.inventory = state.inventory.filter(function(x){return x.id!==id;});
    logActivity('deleted','Inventory','Deleted '+(it?it.name:'item'));
  } else if (type==='supplier') {
    var s = state.suppliers.find(function(x){return x.id===id;});
    state.suppliers = state.suppliers.filter(function(x){return x.id!==id;});
    logActivity('deleted','Suppliers','Deleted '+(s?s.name:'supplier'));
  } else if (type==='vehicle') {
    var v = state.vehicles.find(function(x){return x.id===id;});
    state.vehicles = state.vehicles.filter(function(x){return x.id!==id;});
    logActivity('deleted','Vehicles','Deleted '+(v?v.name:'vehicle'));
  } else if (type==='equipment') {
    var e = state.equipment.find(function(x){return x.id===id;});
    state.equipment = state.equipment.filter(function(x){return x.id!==id;});
    logActivity('deleted','Equipment','Deleted '+(e?e.name:'equipment'));
  }
  saveState();
  updateBadge();
  renderSection(state.activeTab);
  showToast('Item deleted','success');
}

// ========== SAVE FUNCTIONS ==========
function saveInventory(editId) {
  var name = document.getElementById('m_name').value.trim();
  if (!name) { alert('Please enter an item name.'); return; }
  var obj = {
    name: name,
    category: document.getElementById('m_category').value.trim(),
    location: document.getElementById('m_location').value.trim(),
    monthAdded: parseInt(document.getElementById('m_month').value),
    yearAdded: state.year,
    qty: parseInt(document.getElementById('m_qty').value)||0,
    threshold: parseInt(document.getElementById('m_threshold').value)||0,
    reorderQty: parseInt(document.getElementById('m_reorderQty').value)||0,
    unitCost: parseFloat(document.getElementById('m_unitCost').value)||0,
    supplierId: parseInt(document.getElementById('m_supplier').value)||null,
    status: document.getElementById('m_status').value,
    notes: document.getElementById('m_notes').value.trim()
  };
  if (editId) {
    var it = state.inventory.find(function(x){return x.id===editId;});
    if (it) Object.assign(it, obj);
    logActivity('edited','Inventory','Updated '+name);
  } else {
    obj.id = nextId(state.inventory);
    state.inventory.push(obj);
    logActivity('added','Inventory','Added '+name);
  }
  saveState();
  closeModal();
  updateBadge();
  renderSection(state.activeTab);
  showToast((editId?'Updated':'Added')+' '+name,'success');
  // Check low stock after save
  if (obj.qty <= obj.threshold) {
    setTimeout(function(){ showToast('Warning: '+name+' is below stock threshold!','error'); }, 500);
  }
}

    nextCalibration: document.getElementById('m_nextCal').value,
    interval: document.getElementById('m_interval').value,
    warrantyExpiry: document.getElementById('m_warranty').value,
    notes: document.getElementById('m_notes').value.trim()
  };
  if (editId) {
    var eq = state.equipment.find(function(x){return x.id===editId;});
    if (eq) Object.assign(eq, obj);
    logActivity('edited','Equipment','Updated '+name);
  } else {
    obj.id = nextId(state.equipment);
    state.equipment.push(obj);
    logActivity('added','Equipment','Added '+name);
  }
  saveState();
  closeModal();
  renderSection(state.activeTab);
  showToast((editId?'Updated':'Added')+' '+name,'success');
}

function saveBudget() {
  state.budget.annual = parseFloat(document.getElementById('m_annual').value)||0;
  logActivity('edited','Budget','Set annual budget to '+fmt(state.budget.annual));
  saveState();
  closeModal();
  renderSection(state.activeTab);
  showToast('Budget updated to '+fmt(state.budget.annual),'success');
}

function saveExpense() {
  var itemCat = document.getElementById('m_itemCat').value.trim();
  if (!itemCat) { alert('Please enter an item/category.'); return; }
  var obj = {
    id: nextId(state.expenses),
    date: document.getElementById('m_date').value,
    itemCategory: itemCat,
    supplierId: parseInt(document.getElementById('m_supplier').value)||null,
    qty: parseInt(document.getElementById('m_qty').value)||1,
    unitCost: parseFloat(document.getElementById('m_unitCost').value)||0,
    notes: document.getElementById('m_notes').value.trim()
  };
  state.expenses.push(obj);
  logActivity('added','Budget','Logged expense: '+itemCat+' '+fmt(obj.qty*obj.unitCost));
  saveState();
  closeModal();
  renderSection(state.activeTab);
  showToast('Expense logged: '+fmt(obj.qty*obj.unitCost),'success');
}

// ========== GOOGLE DRIVE SYNC ==========
function initDriveSync() {
  if (!DRIVE_CLIENT_ID) {
    updateDriveUI('no-config');
    return;
  }
  var s = document.createElement('script');
  s.src = 'https://accounts.google.com/gsi/client';
  s.onload = function() { updateDriveUI('signed-out'); };
  document.head.appendChild(s);
}

function driveSignIn() {
  var client = google.accounts.oauth2.initTokenClient({
    client_id: DRIVE_CLIENT_ID,
    scope: DRIVE_SCOPES,
    callback: function(resp) {
      if (resp.error) { showToast('Google sign-in failed','error'); return; }
      driveToken = resp.access_token;
      updateDriveUI('signed-in');
      showToast('Connected to Google Drive','success');
      loadFromDrive();
    }
  });
  client.requestAccessToken();
}

function driveSignOut() {
  if (driveToken) {
    google.accounts.oauth2.revoke(driveToken);
    driveToken = null;
    driveFileId = null;
    updateDriveUI('signed-out');
    showToast('Disconnected from Google Drive','success');
  }
}

function updateDriveUI(status) {
  var el = document.getElementById('driveStatus');
  if (!el) return;
  if (status === 'no-config') {
    el.innerHTML = '';
  } else if (status === 'signed-out') {
    el.innerHTML = '<button class="btn btn-ghost btn-sm" onclick="driveSignIn()" style="width:100%;justify-content:center;gap:6px;">&#9729; Connect Google Drive</button>';
  } else if (status === 'signed-in') {
    el.innerHTML = '<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--green);margin-bottom:6px;">&#10003; Drive synced</div><button class="btn btn-ghost btn-sm" onclick="driveSignOut()" style="width:100%;justify-content:center;font-size:11px;">Disconnect</button>';
  }
}

function driveFetch(url, opts) {
  opts = opts || {};
  opts.headers = opts.headers || {};
  opts.headers['Authorization'] = 'Bearer ' + driveToken;
  return fetch(url, opts).then(function(r) {
    if (r.status === 401) {
      driveToken = null;
      updateDriveUI('signed-out');
      showToast('Drive session expired — please reconnect','error');
      return Promise.reject('auth_expired');
    }
    return r;
  });
}

function findDriveFile() {
  return driveFetch('https://www.googleapis.com/drive/v3/files?q=name%3D%27' + encodeURIComponent(DRIVE_FILE_NAME) + '%27+and+trashed%3Dfalse&spaces=drive&fields=files(id,name,modifiedTime)')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.files && data.files.length > 0) {
        driveFileId = data.files[0].id;
        return data.files[0];
      }
      return null;
    });
}

function loadFromDrive() {
  findDriveFile().then(function(file) {
    if (!file) { saveToDrive(); return; }
    return driveFetch('https://www.googleapis.com/drive/v3/files/' + file.id + '?alt=media')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.inventory) {
          state = data;
          if (!state.activityLog) state.activityLog = [];
          if (!state.reportMonth) state.reportMonth = new Date().getMonth();
          if (!state.reportYear) state.reportYear = new Date().getFullYear();
          saveState(true);
          switchTab(state.activeTab);
          updateBadge();
          showToast('Data restored from Google Drive','success');
        }
      });
  }).catch(function(e) {
    if (e !== 'auth_expired') console.error('Drive load error:', e);
  });
}

function saveToDrive() {
  if (!driveToken) return;
  var data = JSON.stringify(state);
  var metadata = { name: DRIVE_FILE_NAME, mimeType: 'application/json' };
  var boundary = '-------xepa_boundary';
  var body = '--' + boundary + '\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n' +
    JSON.stringify(driveFileId ? { mimeType:'application/json' } : metadata) +
    '\r\n--' + boundary + '\r\nContent-Type: application/json\r\n\r\n' + data + '\r\n--' + boundary + '--';

  var url = driveFileId
    ? 'https://www.googleapis.com/upload/drive/v3/files/' + driveFileId + '?uploadType=multipart'
    : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';

  driveFetch(url, {
    method: driveFileId ? 'PATCH' : 'POST',
    headers: { 'Content-Type': 'multipart/related; boundary=' + boundary },
    body: body
  }).then(function(r) { return r.json(); })
    .then(function(resp) { if (resp.id) driveFileId = resp.id; })
    .catch(function(e) { if (e !== 'auth_expired') console.error('Drive save error:', e); });
}

function scheduleDriveSync() {
  if (!driveToken) return;
  clearTimeout(driveSaveTimer);
  driveSaveTimer = setTimeout(saveToDrive, 2000);
}

// ========== INIT ==========
loadState();
updateBadge();

// Set up nav clicks
document.querySelectorAll('.nav-item').forEach(function(el) {
  el.addEventListener('click', function(){ switchTab(this.dataset.tab); });
});

// Initial render
switchTab(state.activeTab);

// Init Google Drive sync
initDriveSync();

  var low = lowStockItems();
  if (low.length > 0) {
    showToast('Alert: '+low.length+' item'+(low.length>1?'s':'')+' below stock threshold!','error');
  }
}, 800);
</script>
