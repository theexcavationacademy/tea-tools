<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manhole-to-Manhole Slope Calculator — The Excavation Academy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #E87722;
  --orange-dim: rgba(232,119,34,0.15);
  --orange-glow: rgba(232,119,34,0.4);
  --red: #CC2222;
  --green: #1F7A4D;
  --blue: #2E75B6;
  --bg: #080808;
  --surface: #0F0F0F;
  --border: #1E1E1E;
  --border-bright: #2A2A2A;
  --text: #E0E0E0;
  --muted: #555;
  --dimmer: #333;
}
html { font-size: 16px; }
body {
  min-height: 100vh;
  background: var(--bg);
  font-family: 'Barlow', sans-serif;
  color: var(--text);
  overflow-x: hidden;
}

/* Grid background */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(232,119,34,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(232,119,34,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

.top-bar { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--orange), #FF9A4A, var(--orange)); z-index: 100; }

.wrap { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 52px 24px 100px; }

/* ── HEADER ── */
.header { margin-bottom: 52px; }
.header-eyebrow { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.pulse { width: 7px; height: 7px; background: var(--orange); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(0.8);} }
.eyebrow-text { font-family: 'Barlow Condensed', monospace; font-size: 11px; letter-spacing: 4px; color: var(--orange); text-transform: uppercase; }

.logo-title { display: flex; align-items: flex-end; gap: 18px; flex-wrap: wrap; }
.logo { width: 56px; height: 56px; object-fit: contain; flex-shrink: 0; }
.title-block h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(30px, 5vw, 52px);
  font-weight: 900;
  letter-spacing: -1px;
  line-height: 1;
  color: #FFF;
}
.title-block h1 span { color: var(--orange); }
.subtitle { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; letter-spacing: 3px; color: var(--muted); margin-top: 8px; text-transform: uppercase; }

/* ── UNIT TOGGLE ── */
.unit-toggle { display: inline-flex; border: 1px solid var(--border-bright); margin-bottom: 40px; overflow: hidden; }
.unit-btn {
  padding: 9px 24px;
  background: transparent;
  color: var(--muted);
  border: none;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: all 0.2s;
}
.unit-btn.active { background: var(--orange); color: #FFF; }

/* ── PIPE TYPE SELECTOR ── */
.pipe-type-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 40px; }
.pipe-btn {
  padding: 9px 18px;
  background: transparent;
  color: #FFF;
  border: 1px solid var(--border-bright);
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.15s;
}
.pipe-btn.active-sanitary { background: var(--red); border-color: var(--red); }
.pipe-btn.active-storm { background: var(--green); border-color: var(--green); }
.pipe-btn.active-water { background: var(--blue); border-color: var(--blue); }

/* ── DIAGRAM ── */
.diagram-wrap { margin-bottom: 40px; }
.diagram {
  background: var(--surface);
  border: 1px solid var(--border-bright);
  padding: 28px 24px 20px;
  position: relative;
  overflow: hidden;
}
.diagram::before {
  content: 'CROSS-SECTION VIEW';
  position: absolute; top: 10px; right: 14px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; letter-spacing: 3px; color: var(--border-bright);
}
.diagram-inner { display: flex; align-items: flex-end; gap: 0; position: relative; height: 100px; }
.mh {
  width: 60px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center;
  position: relative;
}
.mh-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; letter-spacing: 2px; color: var(--muted);
  margin-bottom: 6px; text-transform: uppercase;
}
.mh-shaft {
  width: 18px;
  border: 2px solid var(--border-bright);
  border-bottom: none;
  position: relative;
}
.mh-ring {
  width: 24px; height: 8px;
  background: var(--border-bright);
  border-radius: 2px 2px 0 0;
  margin-bottom: 2px;
}
.mh-invert {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 900;
  margin-top: 6px;
  transition: color 0.3s;
}
.pipe-line {
  flex: 1;
  height: 2px;
  background: linear-gradient(90deg, var(--orange) 0%, rgba(232,119,34,0.5) 100%);
  position: relative;
  align-self: center;
  transform-origin: left center;
}
.pipe-line::before {
  content: '';
  position: absolute; inset: -3px 0;
  border-top: 1px dashed rgba(232,119,34,0.25);
  border-bottom: 1px dashed rgba(232,119,34,0.25);
}
.flow-arrow {
  position: absolute; right: -1px; top: 50%;
  transform: translateY(-50%);
  width: 0; height: 0;
  border-top: 5px solid transparent;
  border-bottom: 5px solid transparent;
  border-left: 8px solid var(--orange);
}
.drop-indicator {
  position: absolute;
  right: 20px;
  display: flex; flex-direction: column; align-items: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; color: var(--orange); letter-spacing: 1px;
}
.drop-line { width: 1px; background: var(--orange-dim); flex: 1; min-height: 20px; }

/* ── INPUT GRID ── */
.inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
@media(max-width: 520px) { .inputs-grid { grid-template-columns: 1fr; } }
.input-group { display: flex; flex-direction: column; gap: 8px; }
.input-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase;
}
.input-label span { color: var(--orange); margin-right: 6px; }
.input-wrap { position: relative; }
.field {
  width: 100%;
  padding: 14px 52px 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border-bright);
  color: #FFF;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 900;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  -moz-appearance: textfield;
}
.field::-webkit-outer-spin-button, .field::-webkit-inner-spin-button { -webkit-appearance: none; }
.field:focus { border-color: var(--orange); box-shadow: 0 0 0 3px var(--orange-dim); }
.field-unit {
  position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; letter-spacing: 1px; color: var(--muted);
}

/* Dia row */
.dia-section { margin-bottom: 40px; }
.dia-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; margin-top: 12px; }
.dia-btn {
  padding: 10px 8px;
  background: transparent;
  border: 1px solid var(--border);
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  color: #FFF; font-size: 16px; font-weight: 900;
  text-align: center;
  transition: all 0.15s;
}
.dia-btn:hover { border-color: var(--border-bright); }
.dia-btn.selected { background: var(--surface); }
.dia-btn .dia-min { font-size: 9px; color: var(--muted); letter-spacing: 1px; margin-top: 3px; }

/* ── RESULTS ── */
.results {
  border: 1px solid var(--border-bright);
  background: var(--surface);
  padding: 32px;
  position: relative;
  margin-top: 8px;
  transition: border-color 0.3s;
}
.results-header {
  position: absolute; top: -1px; left: 20px;
  padding: 2px 14px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 900; letter-spacing: 3px;
  color: #FFF; text-transform: uppercase;
  transition: background 0.3s;
}
.results-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 28px; margin-top: 12px; }
@media(max-width: 520px) { .results-grid { grid-template-columns: 1fr; } }
.result-item { }
.result-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 2px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
.result-val { font-family: 'Barlow Condensed', sans-serif; font-size: 40px; font-weight: 900; line-height: 1; color: #FFF; }
.result-val.accent { color: var(--orange); }
.result-sub { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 1px; }
.result-val.pass { color: var(--green); }
.result-val.fail { color: var(--red); }
.result-val.water { color: var(--blue); }

.divider { grid-column: 1/-1; border-top: 1px solid var(--border); padding-top: 24px; }

.pass-bar-wrap { margin-top: 16px; grid-column: 1/-1; }
.pass-bar-track {
  height: 6px; background: var(--border);
  border-radius: 0; position: relative; overflow: hidden;
}
.pass-bar-fill { height: 100%; width: 0%; transition: width 0.6s cubic-bezier(0.16,1,0.3,1), background 0.3s; }

.warning { grid-column: 1/-1; font-size: 11px; color: var(--muted); line-height: 1.7; border-top: 1px solid var(--border); padding-top: 16px; margin-top: 4px; }

/* Empty state */
.empty {
  border: 1px solid var(--border);
  padding: 40px; text-align: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; letter-spacing: 3px; color: var(--dimmer);
  text-transform: uppercase;
}

/* Footer */
.footer { margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.footer-brand { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; color: var(--orange); letter-spacing: 2px; font-weight: 900; }
.footer-link { font-size: 10px; color: var(--dimmer); margin-top: 3px; }
.footer-link a { color: var(--muted); text-decoration: none; transition: color 0.15s; }
.footer-link a:hover { color: var(--orange); }
.footer-module { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; color: var(--dimmer); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="header-eyebrow">
      <div class="pulse"></div>
      <span class="eyebrow-text">The Excavation Academy</span>
    </div>
    <div class="logo-title">
      <img id="logo" src="" alt="T.E.A." class="logo" />
      <div class="title-block">
        <h1>MANHOLE TO MANHOLE<br><span>SLOPE CALCULATOR</span></h1>
        <p class="subtitle">Invert elevations · Slope · Drop · Velocity · Pass/Fail</p>
      </div>
    </div>
  </div>

  <!-- Unit Toggle -->
  <div class="unit-toggle">
    <button class="unit-btn active" id="btn-m" onclick="setUnit('metric')">Metric (m)</button>
    <button class="unit-btn" id="btn-i" onclick="setUnit('imperial')">Imperial (ft)</button>
  </div>

  <!-- Pipe Type -->
  <div style="margin-bottom:8px;">

  </div>
  <div class="pipe-type-row" id="pipe-type-row">
    <button class="pipe-btn active-sanitary" onclick="setPipe('sanitary',this)">Sanitary Sewer</button>
    <button class="pipe-btn" onclick="setPipe('storm',this)">Storm Drainage</button>
    <button class="pipe-btn" onclick="setPipe('water',this)">Water Main</button>
  </div>

  <!-- Diagram -->
  <div class="diagram-wrap">
    <div class="diagram">
      <div class="diagram-inner" id="diagram">
        <!-- rendered by JS -->
      </div>
    </div>
  </div>

  <!-- Inputs -->
  <div class="inputs-grid">
    <div class="input-group">
      <label class="input-label"><span>01</span>Upstream Invert Elev.</label>
      <div class="input-wrap">
        <input type="number" class="field" id="inv-up" step="0.001" placeholder="e.g. 312.450" oninput="calculate()" />
        <span class="field-unit" id="unit-up">m</span>
      </div>
    </div>
    <div class="input-group">
      <label class="input-label"><span>02</span>Downstream Invert Elev.</label>
      <div class="input-wrap">
        <input type="number" class="field" id="inv-dn" step="0.001" placeholder="e.g. 311.870" oninput="calculate()" />
        <span class="field-unit" id="unit-dn">m</span>
      </div>
    </div>
    <div class="input-group" style="grid-column:1/-1;">
      <label class="input-label"><span>03</span>Distance Between Manholes</label>
      <div class="input-wrap" style="max-width:300px;">
        <input type="number" class="field" id="distance" step="0.1" placeholder="e.g. 76.5" oninput="calculate()" />
        <span class="field-unit" id="unit-dist">m</span>
      </div>
    </div>
  </div>

  <!-- Diameter -->
  <div class="dia-section">
    <span class="input-label"><span style="color:var(--orange);margin-right:6px;">04</span>Pipe Diameter <span style="color:var(--muted);font-weight:400;">(for pass/fail &amp; velocity)</span></span>
    <div class="dia-grid" id="dia-grid"></div>
  </div>

  <!-- Results -->
  <div id="results-area"></div>

  <!-- Footer -->
  <div class="footer">
    <div>
      <div class="footer-brand">THE EXCAVATION ACADEMY</div>
      <div class="footer-link"><a href="https://www.skool.com/the-excavation-academy-2540" target="_blank">skool.com/the-excavation-academy-2540</a></div>
    </div>
    <div class="footer-module">TIER 1 — MODULE 5 // PIPE GRADES &amp; SLOPES</div>
  </div>

</div>

function setUnit(u) {
  unit = u;
  selDia = null;
  document.getElementById('btn-m').classList.toggle('active', u==='metric');
  document.getElementById('btn-i').classList.toggle('active', u==='imperial');
  const unitLabel = u==='metric' ? 'm' : 'ft';
  ['unit-up','unit-dn','unit-dist'].forEach(id => document.getElementById(id).textContent = unitLabel);
  ['inv-up','inv-dn','distance'].forEach(id => { document.getElementById(id).value=''; });
  document.getElementById('inv-up').placeholder = u==='metric' ? 'e.g. 312.450' : 'e.g. 1024.75';
  document.getElementById('inv-dn').placeholder = u==='metric' ? 'e.g. 311.870' : 'e.g. 1022.90';
  document.getElementById('distance').placeholder = u==='metric' ? 'e.g. 76.5' : 'e.g. 250';
  renderDia();
  calculate();
}

function setPipe(type, btn) {
  pipeType = type;
  selDia = null;
  document.querySelectorAll('.pipe-btn').forEach(b => {
    b.className = 'pipe-btn';
  });
  btn.classList.add('active-' + type);
  renderDia();
  calculate();
}

function renderDia() {
  const data = PIPE_DATA[unit][pipeType];
  const isWater = pipeType === 'water';
  const container = document.getElementById('dia-grid');
  container.innerHTML = '';
  data.diameters.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'dia-btn' + (d.size === selDia ? ' selected' : '');
    if (d.size === selDia) btn.style.borderColor = data.color;
    btn.innerHTML = `<div>${d.size}</div><div class="dia-min">${isWater ? 'Pressure' : 'Min '+d.minSlope+'%'}</div>`;
    btn.onclick = () => { selDia = d.size; renderDia(); calculate(); };
    container.appendChild(btn);
  });
}

function renderDiagram(upVal, dnVal, slope) {
  const data = PIPE_DATA[unit][pipeType];
  const color = data.color;
  const upColor = upVal ? '#FFF' : 'var(--muted)';
  const dnColor = dnVal ? '#FFF' : 'var(--muted)';
  const upText = upVal ? upVal.toFixed(3) : '—';
  const dnText = dnVal ? dnVal.toFixed(3) : '—';
  const tiltDeg = slope ? Math.min(slope * 1.5, 12) : 0;
  const u = unit === 'metric' ? 'm' : 'ft';

  document.getElementById('diagram').innerHTML = `
    <div class="mh" style="margin-bottom:${tiltDeg*2}px;">
      <div class="mh-label">Upstream</div>
      <div class="mh-ring"></div>
      <div class="mh-shaft" style="height:60px;border-color:${color};"></div>
      <div class="mh-invert" style="color:${upColor};">${upText}<span style="font-size:10px;color:var(--muted);margin-left:3px;">${u}</span></div>
    </div>
    <div class="pipe-line" style="background:linear-gradient(90deg,${color},rgba(232,119,34,0.3));transform:rotate(${tiltDeg}deg);transform-origin:left center;">
      <div class="flow-arrow" style="border-left-color:${color};"></div>
    </div>
    <div class="mh">
      <div class="mh-label">Downstream</div>
      <div class="mh-ring"></div>
      <div class="mh-shaft" style="height:60px;border-color:${color};"></div>
      <div class="mh-invert" style="color:${dnColor};">${dnText}<span style="font-size:10px;color:var(--muted);margin-left:3px;">${u}</span></div>
    </div>
  `;
}

function calculate() {
  const upVal = parseFloat(document.getElementById('inv-up').value);
  const dnVal = parseFloat(document.getElementById('inv-dn').value);
  const dist = parseFloat(document.getElementById('distance').value);
  const data = PIPE_DATA[unit][pipeType];
  const isWater = pipeType === 'water';
  const color = data.color;
  const selData = data.diameters.find(d => d.size === selDia);

  const hasInputs = !isNaN(upVal) && !isNaN(dnVal) && !isNaN(dist) && dist > 0;
  const slope = hasInputs ? ((upVal - dnVal) / dist) * 100 : null;

  renderDiagram(isNaN(upVal)?null:upVal, isNaN(dnVal)?null:dnVal, slope);

  const area = document.getElementById('results-area');

  if (!hasInputs || slope === null) {
    area.innerHTML = `<div class="empty">Enter upstream &amp; downstream inverts + distance to calculate</div>`;
    return;
  }

  if (slope < 0) {
    area.innerHTML = `<div class="results" style="border-color:var(--red);"><div class="results-header" style="background:var(--red);">ERROR</div><div style="margin-top:20px;font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--red);letter-spacing:1px;">⚠ Upstream invert is LOWER than downstream — pipe flows uphill. Check your elevations.</div></div>`;
    return;
  }

  // Drop
  const drop = upVal - dnVal;
  const dropMm = unit === 'metric' ? drop * 1000 : drop * 304.8;
  const dropIn = unit === 'metric' ? drop * 39.3701 : drop * 12;

  // Velocity (Manning's n=0.013, full pipe flow, simplified)
  let velocity = null;
  let velocityLabel = '';
  if (selData && selData.d > 0) {
    const d = selData.d; // diameter in feet (imperial) or metres (metric)
    const R = d / 4; // hydraulic radius for full pipe
    const n = 0.013;
    const S = slope / 100;
    velocity = (1 / n) * Math.pow(R, 2/3) * Math.pow(S, 0.5);
    if (unit === 'imperial') {
      // Manning's in imperial: V = (1.486/n) * R^(2/3) * S^(1/2), R in feet
      velocity = (1.486 / n) * Math.pow(R, 2/3) * Math.pow(S, 0.5);
      velocityLabel = 'ft/s';
    } else {
      velocityLabel = 'm/s';
    }
  }

  // Pass/fail
  let passHTML = '';
  let passBarPct = 0;
  let passFail = null;
  if (selData && !isWater) {
    passFail = slope >= selData.minSlope;
    const ratio = selData.minSlope > 0 ? Math.min((slope / selData.minSlope), 2) : 1;
    passBarPct = Math.min(ratio * 50, 100);
    const passClass = passFail ? 'pass' : 'fail';
    const passText = passFail ? '✓ PASSES' : '✗ BELOW MIN';
    const minText = `Minimum for ${selDia}: ${selData.minSlope}%`;
    passHTML = `
      <div class="result-item">
        <div class="result-lbl">Pass / Fail</div>
        <div class="result-val ${passClass}" style="font-size:32px;">${passText}</div>
        <div class="result-sub">${minText}</div>
      </div>
      <div class="pass-bar-wrap" style="grid-column:1/-1;">
        <div style="display:flex;justify-content:space-between;font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;text-transform:uppercase;">
          <span>0%</span><span>Min ${selData.minSlope}%</span><span>${(selData.minSlope*2).toFixed(2)}%</span>
        </div>
        <div class="pass-bar-track">
          <div class="pass-bar-fill" id="pass-bar" style="width:${passBarPct}%;background:${passFail?'var(--green)':'var(--red)'}"></div>
        </div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);margin-top:6px;letter-spacing:1px;">Calculated: ${slope.toFixed(3)}%</div>
      </div>`;
  } else if (isWater) {
    passHTML = `<div class="result-item"><div class="result-lbl">Pass / Fail</div><div class="result-val water" style="font-size:20px;">Pressure System</div><div class="result-sub">Slope for air bleed &amp; drainage only</div></div>`;
  }

  const velHTML = velocity !== null ? `
    <div class="result-item">
      <div class="result-lbl">Flow Velocity (full pipe)</div>
      <div class="result-val" style="color:#FFF;">${velocity.toFixed(2)}</div>
      <div class="result-sub">${velocityLabel} — Manning's n=0.013</div>
    </div>` : '';

  // Drop display
  const dropPrimary = unit === 'metric'
    ? `<div class="result-val accent">${dropMm.toFixed(0)}</div><div class="result-sub">mm drop</div>`
    : `<div class="result-val accent">${dropIn.toFixed(2)}</div><div class="result-sub">inches drop</div>`;
  const dropSecondary = unit === 'metric'
    ? `(${drop.toFixed(3)} m)`
    : `(${drop.toFixed(3)} ft)`;

  area.innerHTML = `
    <div class="results" style="border-color:${color};">
      <div class="results-header" style="background:${color};">RESULTS</div>
      <div class="results-grid">
        <div class="result-item">
          <div class="result-lbl">Slope</div>
          <div class="result-val accent">${slope.toFixed(3)}%</div>
          <div class="result-sub">${(slope/100).toFixed(5)} m/m ratio</div>
        </div>
        <div class="result-item">
          <div class="result-lbl">Invert Drop</div>
          ${dropPrimary}
          <div class="result-sub">${dropSecondary}</div>
        </div>
        ${velHTML}
        ${passHTML}
        <div class="warning">⚠ Velocity calculated using Manning's equation at full-pipe flow (n=0.013). Actual velocity varies with flow depth. Always verify minimum slopes against your project specifications or local municipal standard — jurisdiction requirements vary.</div>
      </div>
    </div>`;
}

// Init
renderDia();
renderDiagram(null, null, null);
calculate();
</script>
</body>
</html>
